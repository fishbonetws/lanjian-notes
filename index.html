const DB={db:null,async init(){return new Promise((resolve,reject)=>{const req=indexedDB.open('lanjian_db',1);req.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains('collections'))db.createObjectStore('collections',{keyPath:'id',autoIncrement:true});if(!db.objectStoreNames.contains('projects')){const ps=db.createObjectStore('projects',{keyPath:'id',autoIncrement:true});ps.createIndex('collection_id','collection_id',{unique:false})}if(!db.objectStoreNames.contains('characters')){const cs=db.createObjectStore('characters',{keyPath:'id',autoIncrement:true});cs.createIndex('project_id','project_id',{unique:false})}if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});if(!db.objectStoreNames.contains('sessions'))db.createObjectStore('sessions',{keyPath:'id',autoIncrement:true})};req.onsuccess=(e)=>{this.db=e.target.result;resolve()};req.onerror=(e)=>reject(e)})},tx(s,m='readonly'){return this.db.transaction(s,m).objectStore(s)},async add(s,d){return new Promise((r,j)=>{const q=this.tx(s,'readwrite').add(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})},async put(s,d){return new Promise((r,j)=>{const q=this.tx(s,'readwrite').put(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})},async get(s,i){return new Promise((r,j)=>{const q=this.tx(s).get(i);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})},async all(s){return new Promise((r,j)=>{const q=this.tx(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>j(q.error)})},async byIndex(s,i,v){return new Promise((r,j)=>{const q=this.tx(s).index(i).getAll(v);q.onsuccess=()=>r(q.result||[]);q.onerror=()=>j(q.error)})},async del(s,i){return new Promise((r,j)=>{const q=this.tx(s,'readwrite').delete(i);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})},async clear(s){return new Promise((r,j)=>{const q=this.tx(s,'readwrite').clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error)})},async getSetting(k,d=null){const i=await this.get('settings',k);return i?i.value:d},async setSetting(k,v){return this.put('settings',{key:k,value:v})},async logSession(p,w,d){return this.add('sessions',{project_id:p,words_written:w,duration_seconds:d,date:new Date().toISOString().slice(0,10),ended_at:Date.now()})},async exportAll(){return{version:1,exported_at:new Date().toISOString(),collections:await this.all('collections'),projects:await this.all('projects'),characters:await this.all('characters'),settings:await this.all('settings'),sessions:await this.all('sessions')}},async importAll(d,m='merge'){if(m==='overwrite'){await this.clear('collections');await this.clear('projects');await this.clear('characters');await this.clear('settings');await this.clear('sessions')}for(const c of(d.collections||[])){const{id,...r}=c;await this.add('collections',r)}for(const p of(d.projects||[])){const{id,...r}=p;await this.add('projects',r)}for(const c of(d.characters||[])){const{id,...r}=c;await this.add('characters',r)}for(const s of(d.settings||[]))await this.put('settings',s);for(const s of(d.sessions||[])){const{id,...r}=s;await this.add('sessions',r)}}};
const U={escape(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')},countWords(t){if(!t)return 0;const c=(t.match(/[\u4e00-\u9fa5]/g)||[]).length;const e=(t.match(/[a-zA-Z]+/g)||[]).length;const n=(t.match(/\d+/g)||[]).length;return c+e+n},textFromHtml(h,m=200){if(!h)return'';const d=document.createElement('div');d.innerHTML=h;const t=(d.textContent||'').trim();if(t.length>m)return t.slice(0,m)+'...';return t},statusInfo(s){return{draft:{label:'草稿',icon:'📝'},writing:{label:'写作中',icon:'✏️'},done:{label:'完结',icon:'💗'},published:{label:'已发布',icon:'🌸'}}[s]||{label:'草稿',icon:'📝'}},formatDate(t){if(!t)return'';const d=new Date(t);const n=new Date();const df=n-d;if(df<60000)return'刚刚';if(df<3600000)return Math.floor(df/60000)+'分钟前';if(df<86400000)return Math.floor(df/3600000)+'小时前';if(df<604800000)return Math.floor(df/86400000)+'天前';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')},toast(m,d=2000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(this._tt);this._tt=setTimeout(()=>t.classList.remove('show'),d)},showModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modal').style.display='flex'},closeModal(){document.getElementById('modal').style.display='none'},confirm(t,m,onY){this.showModal(`<div class="modal-title">${this.escape(t)}</div><div style="font-size:14px;color:var(--text-sub);line-height:1.6;margin-bottom:16px">${this.escape(m)}</div><div class="form-actions"><button class="btn btn-secondary" onclick="U.closeModal()">取消</button><button class="btn btn-danger" id="cfmBtn">确认</button></div>`);document.getElementById('cfmBtn').onclick=()=>{this.closeModal();if(onY)onY()}},highlight(t,q){if(!q)return this.escape(t);const e=this.escape(t);const s=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp(s,'gi'),m=>`<mark>${m}</mark>`)}};
let currentProject=null;let timerInterval=null;let startTime=0;let lastSavedWords=0;let autoSaveTimer=null;
function exec(cmd,val=null){document.execCommand(cmd,false,val);updateWordCount();scheduleSave()}
function updateWordCount(){const h=document.getElementById('editorContent').innerHTML;const c=U.countWords(h);document.getElementById('editorWordCount').textContent='📝 '+c.toLocaleString()+' 字';if(currentProject)currentProject.word_count=c;return c}
function startTimer(){if(timerInterval)return;startTime=Date.now();timerInterval=setInterval(()=>{const e=Math.floor((Date.now()-startTime)/1000);const m=Math.floor(e/60);const h=Math.floor(m/60);const r=m%60;let t='0min';if(h>0)t=r>0?h+'h '+r+'min':h+'h';else if(m>0)t=m+'min';else t=e+'s';document.getElementById('editorTimer').textContent='⏱ '+t},1000)}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function scheduleSave(){if(autoSaveTimer)clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(()=>save(),3000)}
async function save(){if(!currentProject)return;const h=document.getElementById('editorContent').innerHTML;currentProject.content=h;currentProject.word_count=U.countWords(h);currentProject.updated_at=Date.now();await DB.put('projects',currentProject);document.getElementById('editorTitle').textContent=currentProject.title||'未命名项目'}
async function exitEditor(){stopTimer();if(currentProject){const e=Math.floor((Date.now()-startTime)/1000);if(e>5){const h=document.getElementById('editorContent').innerHTML;const w=U.countWords(h);const d=w-lastSavedWords;if(d>0)await DB.logSession(currentProject.id,d,e)}await save()}goTo('home')}
function toggleCharacterDrawer(){U.toast('人设小抄请到"人设"页面查看~')}function showEditorMenu(){U.showModal(`<div class="modal-title">项目操作</div><div class="option-list"><div class="option-item" onclick="U.closeModal();editProjectInfo()">✏️ 编辑项目信息</div><div class="option-item" onclick="U.closeModal();goTo('characters')">🃏 人设小抄</div><div class="option-item" onclick="U.closeModal();U.confirm('删除项目','确定删除？',async()=>{await DB.del('projects',currentProject.id);currentProject=null;stopTimer();goTo('home');U.toast('已删除')})" style="color:var(--accent-dark)">🗑 删除项目</div></div>`)}
function editProjectInfo(){U.showModal(`<div class="modal-title">编辑项目</div><div class="form-group"><label class="form-label">标题</label><input class="form-input" id="ep_title" value="${U.escape(currentProject.title||'')}"></div><div class="form-group"><label class="form-label">CP 配对</label><input class="form-input" id="ep_cp" value="${U.escape(currentProject.cp_pair||'')}"></div><div class="form-actions"><button class="btn btn-secondary" onclick="U.closeModal()">取消</button><button class="btn btn-primary" onclick="saveProjectInfo()">保存</button></div>`)}
async function saveProjectInfo(){currentProject.title=document.getElementById('ep_title').value.trim();currentProject.cp_pair=document.getElementById('ep_cp').value.trim();currentProject.updated_at=Date.now();await DB.put('projects',currentProject);document.getElementById('editorTitle').textContent=currentProject.title;document.getElementById('editorCp').textContent=currentProject.cp_pair||'未分类';U.closeModal();U.toast('已保存 ✨')}
function showStatusSheet(){U.showModal(`<div class="modal-title">切换状态</div><div class="status-grid"><div class="status-option draft" onclick="changeStatus('draft')">📝 草稿</div><div class="status-option writing" onclick="changeStatus('writing')">✏️ 写作中</div><div class="status-option done" onclick="changeStatus('done')">💗 完结</div><div class="status-option published" onclick="changeStatus('published')">🌸 已发布</div></div>`)}
async function changeStatus(ns){const old=currentProject.status;currentProject.status=ns;currentProject.updated_at=Date.now();await DB.put('projects',currentProject);updateEditorStatus(ns);U.closeModal();U.toast('已切换');if(ns==='done'&&old!=='done'){fireConfetti();setTimeout(()=>U.confirm('🎉 恭喜完结！','生成纪念版？',()=>U.toast('导出功能稍后完善~')),500)}}
function updateEditorStatus(s){const i=U.statusInfo(s);const t=document.getElementById('editorStatus');t.className='status-tag '+s;t.innerHTML=i.icon+' '+i.label}
let particles=[];let animating=false;
function fireConfetti(){const cv=document.getElementById('confetti');const ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;const colors=['#A8B5FF','#C8B6FF','#FF9EBB','#FFD6E7','#8A5FD4'];const emojis=['🌸','💗','✨','🌟','🎉'];for(let i=0;i<60;i++)particles.push({x:cv.width/2+(Math.random()-0.5)*200,y:cv.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-15-5,size:Math.random()*12+8,color:colors[Math.floor(Math.random()*colors.length)],emoji:Math.random()>0.5?emojis[Math.floor(Math.random()*emojis.length)]:null,rot:Math.random()*360,rs:(Math.random()-0.5)*10,life:1});if(!animating){animating=true;animateConfetti()}}
function animateConfetti(){const cv=document.getElementById('confetti');const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.4;p.rot+=p.rs;p.life-=0.005;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(0,p.life);if(p.emoji){ctx.font=(p.size*1.5)+'px serif';ctx.textAlign='center';ctx.fillText(p.emoji,0,0)}else{ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2)}ctx.restore()});particles=particles.filter(p=>p.life>0);if(particles.length>0)requestAnimationFrame(animateConfetti);else{animating=false;ctx.clearRect(0,0,cv.width,cv.height)}}const Pages={currentPage:'home',currentFilter:'all',async renderHome(){const cs=(await DB.all('collections')).filter(c=>!c.deleted_at);const ps=await DB.all('projects');document.getElementById('homeSubtitle').textContent=cs.length+' 个 cp · '+ps.length+' 篇文';document.getElementById('statDraft').textContent=ps.filter(p=>p.status==='draft').length;document.getElementById('statWriting').textContent=ps.filter(p=>p.status==='writing').length;document.getElementById('statDone').textContent=ps.filter(p=>p.status==='done').length;document.getElementById('statPublished').textContent=ps.filter(p=>p.status==='published').length;const g=document.getElementById('collectionsGrid');if(cs.length===0){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📚</div><div class="empty-text">还没有合集<br>点击"新建合集"开始吧 ✿</div></div>';return}g.innerHTML=cs.map(c=>{const cp=ps.filter(p=>p.collection_id===c.id);const st=['draft','writing','done','published'].map(s=>{const n=cp.filter(p=>p.status===s).length;if(n===0)return'';const i=U.statusInfo(s);return`<span class="tag-mini ${s}">${i.icon} ${n}</span>`}).join('');return`<div class="collection-card" onclick="openCollection(${c.id})"><div class="collection-cover">${c.cover_emoji||'🌙'}</div><div class="collection-name">${U.escape(c.name)}</div><div class="collection-cp">${U.escape(c.cp_pair||'')}</div><div class="collection-stats">${st||'<span class="tag-mini">暂无文</span>'}</div></div>`}).join('')},async renderProjects(f='all'){this.currentFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.status===f));let ps=await DB.all('projects');if(f!=='all')ps=ps.filter(p=>p.status===f);ps.sort((a,b)=>(b.updated_at||0)-(a.updated_at||0));const l=document.getElementById('projectsList');if(ps.length===0){l.innerHTML='<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">还没有项目<br>点击右上角"+ 新建"开始 ✿</div></div>';return}l.innerHTML=ps.map(p=>{const i=U.statusInfo(p.status);return`<div class="project-item" data-status="${p.status}" onclick="openProject(${p.id})"><div class="project-item-header"><div class="project-item-title">${U.escape(p.title||'未命名')}</div><span class="status-tag ${p.status}">${i.icon} ${i.label}</span></div>${p.cp_pair?`<div class="project-item-cp">${U.escape(p.cp_pair)}</div>`:''}<div class="project-item-meta"><span>${p.word_count||0} 字</span><span>${U.formatDate(p.updated_at||p.created_at)}</span></div></div>`}).join('')}};
async function openProject(id){try{const p=await DB.get('projects',id);if(!p){U.toast('项目不存在');return}currentProject=p;lastSavedWords=p.word_count||0;document.getElementById('editorTitle').textContent=p.title||'未命名项目';document.getElementById('editorCp').textContent=p.cp_pair||'未分类';const ec=document.getElementById('editorContent');if(ec){ec.innerHTML=p.content||''}updateEditorStatus(p.status);updateWordCount();startTimer();goTo('editor')}catch(e){console.error(e);U.toast('打开失败：'+e.message)}}
async function openCollection(id){const c=await DB.get('collections',id);const ps=await DB.byIndex('projects','collection_id',id);U.showModal(`<div class="modal-title">${U.escape(c.name)}</div><div style="max-height:300px;overflow-y:auto">${ps.length===0?'<div class="empty">还没有项目</div>':ps.map(p=>`<div class="project-item" data-status="${p.status}" onclick="U.closeModal();openProject(${p.id})" style="margin-bottom:8px"><div class="project-item-title">${U.escape(p.title)}</div><div class="project-item-meta"><span>${p.word_count||0} 字</span><span>${U.statusInfo(p.status).icon} ${U.statusInfo(p.status).label}</span></div></div>`).join('')}</div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-secondary" onclick="U.closeModal()">关闭</button><button class="btn btn-danger" style="flex:0 0 auto;padding:12px 16px" onclick="deleteCollection(${id})">🗑 删除合集</button><button class="btn btn-primary" onclick="U.closeModal();showCreateProject(${id})">+ 新建项目</button></div>`)}async function deleteCollection(id){const ps=await DB.byIndex('projects','collection_id',id);const msg=ps.length>0?`此合集下有 ${ps.length} 个项目，连同所有项目和人设将一起永久删除`:'此操作不可恢复';U.confirm('永久删除合集？',msg,async()=>{for(const p of ps){const cs=await DB.byIndex('characters','project_id',p.id);for(const c of cs)await DB.del('characters',c.id);await DB.del('projects',p.id)}await DB.del('collections',id);U.closeModal();Pages.renderHome();U.toast('已永久删除 ✨')})}
function showCreateCollection(){U.showModal(`<div class="modal-title">新建合集</div><div class="form-group"><label class="form-label">合集名 *</label><input class="form-input" id="nc_name" placeholder="例如：A×B 长篇集"></div><div class="form-group"><label class="form-label">CP 配对</label><input class="form-input" id="nc_cp" placeholder="A × B"></div><div class="form-group"><label class="form-label">封面 emoji</label><input class="form-input" id="nc_emoji" value="🌙" maxlength="2"></div><div class="form-actions"><button class="btn btn-secondary" onclick="U.closeModal()">取消</button><button class="btn btn-primary" onclick="createCollection()">创建</button></div>`)}
async function createCollection(){const n=document.getElementById('nc_name').value.trim();if(!n){U.toast('请输入合集名');return}await DB.add('collections',{name:n,cp_pair:document.getElementById('nc_cp').value.trim(),cover_emoji:document.getElementById('nc_emoji').value||'🌙',created_at:Date.now()});U.closeModal();Pages.renderHome();U.toast('创建成功 ✨')}
function showCreateProject(cid=null){U.showModal(`<div class="modal-title">新建项目</div><div class="form-group"><label class="form-label">标题 *</label><input class="form-input" id="np_title" placeholder="例如：夏夜协奏曲"></div><div class="form-group"><label class="form-label">CP 配对</label><input class="form-input" id="np_cp"></div><div class="form-group"><label class="form-label">笔名</label><input class="form-input" id="np_author"></div><div class="form-group"><label class="form-label">合集 ID（可选）</label><input class="form-input" id="np_cid" type="number" value="${cid||''}"></div><div class="form-actions"><button class="btn btn-secondary" onclick="U.closeModal()">取消</button><button class="btn btn-primary" onclick="createProject()">创建</button></div>`)}
async function createProject(){const t=document.getElementById('np_title').value.trim();if(!t){U.toast('请输入标题');return}const cid=parseInt(document.getElementById('np_cid').value)||null;const id=await DB.add('projects',{title:t,cp_pair:document.getElementById('np_cp').value.trim(),author:document.getElementById('np_author').value.trim(),collection_id:cid,content:'',status:'draft',word_count:0,created_at:Date.now(),updated_at:Date.now()});U.closeModal();openProject(id)}
function showCreateMenu(){U.showModal(`<div class="modal-title">新建 ✨</div><div class="option-list"><div class="option-item" onclick="U.closeModal();showCreateCollection()">📚 新建合集</div><div class="option-item" onclick="U.closeModal();showCreateProject()">📝 新建项目</div></div>`)}
async function doSearch(){const q=document.getElementById('searchInput').value.trim();if(!q){document.getElementById('searchResults').innerHTML='<div class="empty">输入关键字搜索</div>';return}const ps=await DB.all('projects');const r=[];for(const p of ps){if((p.title||'').includes(q)||(p.content||'').includes(q)||(p.cp_pair||'').includes(q))r.push({title:p.title,preview:U.textFromHtml(p.content||'',150)})}const div=document.getElementById('searchResults');if(r.length===0){div.innerHTML='<div class="empty">没找到匹配内容</div>';return}div.innerHTML=r.map(x=>`<div class="project-item"><div class="project-item-title">${U.highlight(x.title,q)}</div><div class="project-item-meta">${U.highlight(x.preview,q)}</div></div>`).join('')}
function toggleTheme(){document.body.classList.toggle('dark');const isDark=document.body.classList.contains('dark');document.getElementById('themeSwitch').classList.toggle('on',isDark);DB.setSetting('theme',isDark?'dark':'light')}
async function exportData(){const d=await DB.exportAll();const j=JSON.stringify(d,null,2);const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='蓝笺_'+new Date().toISOString().slice(0,10)+'.lanjian';a.click();URL.revokeObjectURL(u);U.toast('已导出 ✨')}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.lanjian,.json';i.onchange=async(e)=>{const f=e.target.files[0];if(f){const t=await f.text();try{const d=JSON.parse(t);await DB.importAll(d);U.toast('导入成功 ✨');Pages.renderHome()}catch(err){U.toast('导入失败：'+err.message)}}};i.click()}
function confirmReset(){U.confirm('清空所有数据','会删除所有内容！建议先导出备份。',async()=>{await DB.clear('collections');await DB.clear('projects');await DB.clear('characters');await DB.clear('settings');U.toast('已清空');Pages.renderHome()})}
function goTo(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));const pe=document.getElementById('page-'+p);if(pe)pe.classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));Pages.currentPage=p;if(p==='home')Pages.renderHome();else if(p==='projects')Pages.renderProjects(Pages.currentFilter);else if(p==='calendar')renderCalendar();else if(p==='characters')renderCharacters()}
function renderCalendar(){const now=new Date();const y=now.getFullYear();const m=now.getMonth();const d=new Date(y,m+1,0).getDate();const sd=new Date(y,m,1).getDay();let html='';for(let i=0;i<sd;i++)html+='<div></div>';for(let i=1;i<=d;i++)html+=`<div style="aspect-ratio:1;border-radius:6px;background:#F5F5F8;display:flex;align-items:center;justify-content:center;font-size:11px">${i}</div>`;const cd=document.getElementById('calendarDays');if(cd)cd.innerHTML=html;const mt=document.getElementById('monthTitle');if(mt)mt.textContent=y+' 年 '+(m+1)+' 月'}
async function renderCharacters(){if(!currentProject){const cl=document.getElementById('charactersList');if(cl)cl.innerHTML='<div class="empty"><div class="empty-icon">🃏</div><div class="empty-text">先打开一个项目<br>再管理人设</div></div>';return}const cs=await DB.byIndex('characters','project_id',currentProject.id);const div=document.getElementById('charactersList');if(cs.length===0){div.innerHTML='<div class="empty"><div class="empty-icon">🃏</div><div class="empty-text">还没有人设卡</div></div>';return}div.innerHTML=cs.map(c=>`<div class="project-item" style="border-left-color:#FF9EBB"><div class="project-item-title">${U.escape(c.name)}</div><div class="project-item-cp">${U.escape(c.relationship||'主角')}</div><div class="project-item-meta"><span>${U.escape((c.personality||'').slice(0,50))}</span></div></div>`).join('')}
async function showCreateCharacter(){if(!currentProject){const ps=await DB.all('projects');if(ps.length===0){U.toast('请先创建一个项目');return}currentProject=ps[0];U.toast('已自动关联到：'+currentProject.title)}U.showModal(`<div class="modal-title">新建人物</div><div class="form-group"><label class="form-label">名称 *</label><input class="form-input" id="cf_name" placeholder="角色名"></div><div class="form-group"><label class="form-label">性别</label><input class="form-input" id="cf_gender"></div><div class="form-group"><label class="form-label">外貌</label><textarea class="form-textarea" id="cf_appearance"></textarea></div><div class="form-group"><label class="form-label">性格</label><textarea class="form-textarea" id="cf_personality"></textarea></div><div class="form-group"><label class="form-label">口头禅</label><input class="form-input" id="cf_catchphrase"></div><div class="form-group"><label class="form-label">与主角关系</label><input class="form-input" id="cf_relationship"></div><div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" id="cf_notes" style="background:linear-gradient(135deg,#FFF6E5,#FFE4EC)"></textarea></div><div class="form-actions"><button class="btn btn-secondary" onclick="U.closeModal()">取消</button><button class="btn btn-primary" onclick="saveCharacter()">创建</button></div>`)}async function saveCharacter(){if(!currentProject)return;const data={type:'character',project_id:currentProject.id,name:document.getElementById('cf_name').value.trim(),gender:document.getElementById('cf_gender').value,appearance:document.getElementById('cf_appearance').value,personality:document.getElementById('cf_personality').value,catchphrase:document.getElementById('cf_catchphrase').value,relationship:document.getElementById('cf_relationship').value,notes:document.getElementById('cf_notes').value,sort_order:Date.now().millisecondsSinceEpoch};if(!data.name){U.toast('请输入名称');return}await DB.add('characters',data);U.closeModal();renderCharacters();U.toast('创建成功 ✨')}
(async()=>{setTimeout(()=>{document.getElementById('splash').classList.add('hide');document.getElementById('app').style.display='block'},1500);await DB.init();const t=await DB.getSetting('theme');if(t==='dark'){document.body.classList.add('dark');document.getElementById('themeSwitch').classList.add('on')}await Pages.renderHome();document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>goTo(n.dataset.page)));document.querySelectorAll('.filter-chip').forEach(c=>c.addEventListener('click',()=>Pages.renderProjects(c.dataset.status)))})();
</script>
</body>
</html>
